<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to Aimer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #2f2f2f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; user-select: none; }
        canvas { display: block; }
        #start-message { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00ffcc; font-size: 28px; font-weight: bold; text-transform: uppercase; text-shadow: 0 0 15px rgba(0, 255, 204, 0.7); z-index: 200; pointer-events: none; }
        #ui-toggle-btn { position: fixed; top: 20px; left: 20px; background: rgba(0, 255, 204, 0.2); color: #00ffcc; border: 1px solid #00ffcc; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; z-index: 50; display: none; opacity: 0.6; transition: opacity 0.3s; }
        #ui-toggle-btn:hover { opacity: 1.0; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 6px; height: 6px; background: white; border: 1px solid black; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
        #settings-menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 340px; background: rgba(20, 20, 20, 0.98); padding: 25px; border-radius: 15px; color: white; display: none; flex-direction: column; gap: 12px; border: 1px solid #444; z-index: 100; max-height: 90vh; overflow-y: auto; }
        
        .setting-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; width: 100%; }
        .setting-row label { font-size: 13px; width: 100px; flex-shrink: 0; }
        input[type="range"] { flex-grow: 1; accent-color: #00ffcc; cursor: pointer; height: 6px; }
        input[type="number"], .value-display { width: 60px; background: #111; color: #00ffcc; border: 1px solid #444; text-align: center; font-size: 13px; padding: 2px 0; flex-shrink: 0; }
        
        #score-board { position: fixed; top: 20px; right: 20px; color: #00ffcc; font-size: 24px; font-weight: bold; pointer-events: none; }
        button { padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; border: none; }
        #resumeB { background: #00ffcc; color: #111; margin-top: 10px; }
        #resetB { background: #333; color: #ff4444; border: 1px solid #ff4444; margin-top: 5px; font-size: 12px; }

        .switch { position: relative; display: inline-block; width: 51px !important; height: 31px !important; min-width: 51px !important; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #39393d; transition: .3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 31px; }
        .slider:before { position: absolute; content: ""; height: 27px; width: 27px; left: 2px; bottom: 2px; background-color: white; transition: .3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 50%; box-shadow: 0 3px 6px rgba(0,0,0,0.4); }
        input:checked + .slider { background-color: #34c759; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

<div id="start-message">Click to start</div>
<div id="ui-toggle-btn">設定 (T)</div>
<div id="crosshair"></div>
<div id="score-board">0</div>

<div id="settings-menu">
    <h3 style="margin:0; text-align:center; color:#00ffcc; border-bottom:1px solid #333; padding-bottom:10px;">一時停止</h3>
    <div class="setting-row"><label>感度</label><input type="range" id="sensS" min="0.01" max="10" step="0.01"><input type="number" id="sensI" step="0.01"></div>
    <div class="setting-row"><label>的の数</label><input type="range" id="countS" min="0" max="400" step="1"><input type="number" id="countI" min="0" max="400"></div>
    <div class="setting-row"><label>グリッド X</label><input type="range" id="gridXS" min="1" max="20" step="1"><input type="number" id="gridXI" min="1" max="20"></div>
    <div class="setting-row"><label>グリッド Y</label><input type="range" id="gridYS" min="1" max="20" step="1"><input type="number" id="gridYI" min="1" max="20"></div>
    <div class="setting-row"><label>的の移動速度</label><input type="range" id="moveS" min="0" max="50" step="1"><input type="number" id="moveI" min="0" max="50"></div>
    <div class="setting-row"><label>距離</label><input type="range" id="distS" min="5" max="50"><span id="distV" class="value-display">15m</span></div>
    <div class="setting-row"><label>サイズ</label><input type="range" id="sizeS" min="1" max="15" step="1"><input type="number" id="sizeI" min="1" max="15"></div>
    <div class="setting-row"><label>的カラー</label><input type="color" id="colorI"></div>
    <div class="setting-row"><label>背景カラー</label><input type="color" id="bgColorI"></div>
    
    <div class="setting-row">
        <label>背景グリッド</label>
        <label class="switch"><input type="checkbox" id="gridToggleI"><span class="slider"></span></label>
    </div>
    <div class="setting-row">
        <label>SE再生</label>
        <label class="switch"><input type="checkbox" id="soundI"><span class="slider"></span></label>
    </div>

    <button id="resumeB">ゲームを再開 (T)</button>
    <button id="resetB">設定をリセット</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const STORAGE_KEY = 'aimer_settings_v3_box';
    const defaultConfig = { sens: 0.5, dist: 15, size: 8, color: '#00ffcc', bgColor: '#2f2f2f', sound: true, maxTargets: 3, gridX: 5, gridY: 5, moveSpeed: 0, showGrid: true };
    let config = { ...defaultConfig };

    const scene = new THREE.Scene();
    const getVerticalFov = (hFov) => 2 * Math.atan(Math.tan(hFov * Math.PI / 360) / (window.innerWidth / window.innerHeight)) * (180 / Math.PI);
    const camera = new THREE.PerspectiveCamera(getVerticalFov(103), window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 1.0));

    const yawObj = new THREE.Object3D();
    const pitchObj = new THREE.Object3D();
    scene.add(yawObj); yawObj.add(pitchObj); pitchObj.add(camera);

    let targets = [], currentGrid = [], score = 0, lastIdx = -1, isFirstInteraction = true;
    const geom = new THREE.SphereGeometry(0.7, 32, 32), hitSound = new Audio('hit.mp3'), ray = new THREE.Raycaster();

    const boxSize = 100;
    const grids = [];
    const createGrid = (x, y, z, rx, ry, rz) => {
        const g = new THREE.GridHelper(boxSize, 10, 0x000000, 0x000000);
        g.position.set(x, y, z); g.rotation.set(rx, ry, rz);
        g.material.opacity = 0.4; g.material.transparent = true;
        scene.add(g); grids.push(g);
    };
    createGrid(0, -50, 0, 0, 0, 0); createGrid(0, 50, 0, 0, 0, 0);
    createGrid(-50, 0, 0, 0, 0, Math.PI/2); createGrid(50, 0, 0, 0, 0, Math.PI/2);
    createGrid(0, 0, -50, Math.PI/2, 0, 0); createGrid(0, 0, 50, Math.PI/2, 0, 0);

    function initUI() {
        document.getElementById('sensS').value = document.getElementById('sensI').value = config.sens;
        document.getElementById('gridXS').value = document.getElementById('gridXI').value = config.gridX;
        document.getElementById('gridYS').value = document.getElementById('gridYI').value = config.gridY;
        document.getElementById('countS').value = document.getElementById('countI').value = config.maxTargets;
        document.getElementById('moveS').value = document.getElementById('moveI').value = config.moveSpeed;
        document.getElementById('distS').value = config.dist;
        document.getElementById('distV').innerText = config.dist + "m";
        document.getElementById('sizeS').value = document.getElementById('sizeI').value = config.size;
        document.getElementById('colorI').value = config.color;
        document.getElementById('bgColorI').value = config.bgColor;
        document.getElementById('soundI').checked = config.sound;
        document.getElementById('gridToggleI').checked = config.showGrid;
        scene.background = new THREE.Color(config.bgColor);
        grids.forEach(g => g.visible = config.showGrid);
    }

    function rebuildGrid() {
        currentGrid = [];
        const step = 2.5, offsetX = (config.gridX - 1) * step / 2, offsetY = (config.gridY - 1) * step / 2;
        for(let y = 0; y < config.gridY; y++) for(let x = 0; x < config.gridX; x++) currentGrid.push({ x: x * step - offsetX, y: y * step - offsetY });
        targets.forEach(t => scene.remove(t)); targets = [];
    }

    function spawn() {
        if (config.maxTargets <= 0 || targets.length >= config.maxTargets || currentGrid.length === 0) return;
        let avail = currentGrid.map((_, i) => i).filter(i => !targets.some(t => t.gridIdx === i) && i !== lastIdx);
        if (avail.length === 0) return;
        let idx = avail[Math.floor(Math.random() * avail.length)];
        let m = new THREE.Mesh(geom, new THREE.MeshPhongMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.3 }));
        m.gridIdx = idx;
        const originX = currentGrid[idx].x;
        m.position.set(originX, currentGrid[idx].y, -config.dist);
        m.minX = originX - 5; m.maxX = originX + 5; m.vel = (Math.random() > 0.5 ? 1 : -1);
        scene.add(m); targets.push(m);
    }

    const toggleGameFocus = () => {
        if (isFirstInteraction) { document.getElementById('start-message').style.display = 'none'; document.getElementById('ui-toggle-btn').style.display = 'block'; isFirstInteraction = false; }
        if (document.pointerLockElement === document.body) document.exitPointerLock(); else document.body.requestPointerLock();
    };

    document.addEventListener('pointerlockchange', () => {
        const locked = document.pointerLockElement === document.body;
        document.getElementById('settings-menu').style.display = locked ? 'none' : 'flex';
        document.getElementById('ui-toggle-btn').style.display = locked ? 'block' : 'none';
    });

    window.addEventListener('keydown', (e) => { if (e.key.toLowerCase() === 't') toggleGameFocus(); });
    document.getElementById('ui-toggle-btn').addEventListener('click', toggleGameFocus);
    document.getElementById('resumeB').addEventListener('click', toggleGameFocus);
    document.getElementById('resetB').addEventListener('click', () => { if(confirm('リセットしますか？')) { config = { ...defaultConfig }; localStorage.setItem(STORAGE_KEY, JSON.stringify(config)); initUI(); rebuildGrid(); } });

    // --- 視点移動処理（完全に元のロジックへ戻しました） ---
    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement !== document.body) return;
        if (Math.abs(e.movementX) > 600 || Math.abs(e.movementY) > 300) return;
        const s = config.sens * 0.0006;
        yawObj.rotation.y -= e.movementX * s;
        pitchObj.rotation.x -= e.movementY * s;
        pitchObj.rotation.x = Math.max(-Math.PI/2 + 0.01, Math.min(Math.PI/2 - 0.01, pitchObj.rotation.x));
    });

    window.addEventListener('mousedown', (e) => {
        if (isFirstInteraction) { toggleGameFocus(); return; }
        if (document.pointerLockElement !== document.body || e.button !== 0) return;
        ray.setFromCamera(new THREE.Vector2(0,0), camera);
        let hits = ray.intersectObjects(targets);
        if (hits.length > 0) {
            let t = hits[0].object;
            if (config.sound) { hitSound.currentTime = 0; hitSound.play().catch(()=>{}); }
            lastIdx = t.gridIdx; scene.remove(t); targets.splice(targets.indexOf(t), 1);
            score++; document.getElementById('score-board').innerText = score;
            spawn();
        }
    });

    const sync = (idS, idI, key, cb) => {
        const s = document.getElementById(idS), i = document.getElementById(idI);
        const up = (v) => { config[key] = v; if(cb) cb(); localStorage.setItem(STORAGE_KEY, JSON.stringify(config)); };
        s.oninput = () => { i.value = s.value; up(Number(s.value)); };
        i.onchange = () => { s.value = i.value; up(Number(i.value)); };
    };

    sync('sensS', 'sensI', 'sens');
    sync('countS', 'countI', 'maxTargets');
    sync('gridXS', 'gridXI', 'gridX', rebuildGrid);
    sync('gridYS', 'gridYI', 'gridY', rebuildGrid);
    sync('moveS', 'moveI', 'moveSpeed');
    sync('sizeS', 'sizeI', 'size');

    document.getElementById('distS').oninput = (e) => { config.dist = Number(e.target.value); document.getElementById('distV').innerText = e.target.value + "m"; localStorage.setItem(STORAGE_KEY, JSON.stringify(config)); };
    document.getElementById('colorI').oninput = (e) => { config.color = e.target.value; localStorage.setItem(STORAGE_KEY, JSON.stringify(config)); };
    document.getElementById('bgColorI').oninput = (e) => { config.bgColor = e.target.value; scene.background.set(config.bgColor); localStorage.setItem(STORAGE_KEY, JSON.stringify(config)); };
    document.getElementById('soundI').onchange = (e) => { config.sound = e.target.checked; localStorage.setItem(STORAGE_KEY, JSON.stringify(config)); };
    document.getElementById('gridToggleI').onchange = (e) => { config.showGrid = e.target.checked; grids.forEach(g => g.visible = config.showGrid); localStorage.setItem(STORAGE_KEY, JSON.stringify(config)); };

    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) config = { ...defaultConfig, ...JSON.parse(saved) };
    initUI(); rebuildGrid();

    function animate() {
        requestAnimationFrame(animate);
        if(targets.length < config.maxTargets) spawn();
        
        targets.forEach(t => {
            // 色とサイズ、距離をリアルタイムで反映（的ごとの個別更新）
            t.material.color.set(config.color);
            t.material.emissive.set(config.color);
            const s = config.size * 0.15;
            t.scale.set(s, s, s);
            t.position.z = -config.dist;

            if (config.moveSpeed > 0) {
                t.position.x += t.vel * (config.moveSpeed * 0.003);
                if (t.position.x > t.maxX || t.position.x < t.minX) t.vel *= -1;
            } else if (currentGrid[t.gridIdx]) {
                t.position.x = currentGrid[t.gridIdx].x;
            }
        });
        renderer.render(scene, camera);
    }
    window.onresize = () => { camera.fov = getVerticalFov(103); camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    animate();
</script>
</body>
</html>
